name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check code format with black
      run: |
        pip install black
        black --check . || true
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
    
    - name: Validate notebooks
      run: |
        pip install nbformat
        python -c "
        import nbformat
        import sys
        notebooks = ['BrainTumor_aproach_1.ipynb', 'Braintumor_Aproach_2.ipynb']
        for nb_path in notebooks:
            try:
                with open(nb_path, 'r') as f:
                    nb = nbformat.read(f, as_version=4)
                print(f'✅ {nb_path} is valid')
            except Exception as e:
                print(f'❌ {nb_path} validation failed: {e}')
                sys.exit(1)
        "
    
    - name: Test setup script
      run: |
        python -c "
        import setup
        print('✅ Setup script imports successfully')
        "

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Run security checks
      run: |
        pip install safety bandit
        safety check || true
        bandit -r . -f json || true

  documentation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Check documentation
      run: |
        # Check if required files exist
        files=("README.md" "LICENSE" "requirements.txt" "CHANGELOG.md")
        for file in "${files[@]}"; do
          if [ -f "$file" ]; then
            echo "✅ $file exists"
          else
            echo "❌ $file missing"
            exit 1
          fi
        done
        
        # Check README content
        if grep -q "Brain Tumor MRI Classification" README.md; then
          echo "✅ README has project title"
        else
          echo "❌ README missing project title"
          exit 1
        fi
